<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 注音大對決</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bfdbfe 1px, transparent 1px);
            background-size: 20px 20px;
            touch-action: manipulation;
            user-select: none;
            overflow: hidden; /* 防止整體頁面捲動 */
        }
        .card-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .game-btn {
            transition: all 0.1s;
        }
        .game-btn:active {
            transform: scale(0.95);
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: pop 0.2s ease-out forwards;
        }
        /* Combo 動畫 */
        @keyframes combo-pop {
            0% { transform: scale(0.5) rotate(10deg); opacity: 0; }
            30% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            70% { transform: scale(1) rotate(10deg); opacity: 1; }
            100% { transform: scale(0.8) rotate(10deg); opacity: 0; }
        }
        .animate-combo {
            animation: combo-pop 0.6s ease-out forwards;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }
        .text-outline {
            text-shadow: 
                2px 2px 0 #000,
                -1px -1px 0 #000,  
                1px -1px 0 #000,
                -1px 1px 0 #000,
                1px 1px 0 #000;
        }
        /* 排行榜表格樣式 */
        .rank-row:nth-child(1) .rank-num { color: #eab308; } 
        .rank-row:nth-child(2) .rank-num { color: #94a3b8; } 
        .rank-row:nth-child(3) .rank-num { color: #b45309; }
        
        /* 貼紙樣式 */
        .sticker-slot {
            transition: transform 0.2s;
        }
        .sticker-slot:hover {
            transform: scale(1.1) rotate(5deg);
        }
        .sticker-new-badge {
            animation: bounce 1s infinite;
        }
        
        /* 彩帶特效 Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-2 sm:p-4">

                <button onclick="startGame()" class="game-btn bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white text-lg sm:text-xl font-bold py-3 sm:py-4 px-10 rounded-full shadow-lg transform transition hover:-translate-y-1 w-full max-w-xs">

                    <div id="endEmoji" class="text-5xl sm:text-6xl mb-2 animate-bounce">🎉</div>
                    <h2 id="endTitle" class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">時間到！</h2>

                        </div>

                    <!-- Reward Section (Gacha) -->

                         </div>

                         </div>

                        🔥 挑戰錯題 (<span id="mistakeCount">0</span>)
                    </button>

                    <div class="flex gap-2 w-full max-w-xs mt-1">
                        <button onclick="showCategorySelection()" class="flex-1 game-btn bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm sm:text-base font-bold py-2 sm:py-3 rounded-full shadow-md">

                        </button>
                        <button onclick="startGame()" class="flex-1 game-btn bg-green-500 hover:bg-green-600 text-white text-sm sm:text-base font-bold py-2 sm:py-3 rounded-full shadow-md">
                            再玩一次
                        </button>
                    </div>
                </div>

                <!-- High Score Input View (Initially hidden) -->
                <div id="highScoreView" class="hidden w-full flex flex-col items-center animate-pop">

                    <h2 class="text-xl sm:text-2xl font-bold text-yellow-600 mb-1">打破紀錄！</h2>
                    <p class="text-gray-600 mb-3 text-xs sm:text-sm">太厲害了！你進入了前 5 名！</p>
                    <div class="text-4xl sm:text-5xl font-black text-blue-600 mb-4" id="highScoreValue">0</div>

                    <button onclick="submitHighScore()" class="w-full max-w-xs game-btn bg-blue-600 hover:bg-blue-700 text-white text-base font-bold py-2 sm:py-3 rounded-full shadow-md">

            <!-- Game Area: 減少高度，讓手機版更舒適 -->
            <div class="flex flex-col items-center justify-center flex-grow w-full py-1 sm:py-2 relative z-10">

                </div>
                <div id="resultFeedback" class="h-5 sm:h-6 mt-2 font-bold text-base sm:text-lg transition-opacity opacity-0">...</div>
            </div>

            <!-- Buttons -->
            <div class="grid grid-cols-2 gap-3 w-full mt-1 sm:mt-2 relative z-10 shrink-0">
                <button id="btnOption1" onclick="checkAnswer(currentCategoryConfig.list1Key)" class="game-btn group bg-white border-2 border-pink-100 hover:border-pink-300 hover:bg-pink-50 text-pink-600 rounded-xl sm:rounded-2xl p-3 sm:p-4 flex flex-col items-center shadow-sm relative overflow-hidden">

                    <span id="btnText1" class="text-3xl sm:text-4xl font-black mb-0.5 sm:mb-1">-</span>
                    <span id="btnDesc1" class="text-[10px] sm:text-xs font-bold opacity-70">-</span>
                </button>
                <button id="btnOption2" onclick="checkAnswer(currentCategoryConfig.list2Key)" class="game-btn group bg-white border-2 border-purple-100 hover:border-purple-300 hover:bg-purple-50 text-purple-600 rounded-xl sm:rounded-2xl p-3 sm:p-4 flex flex-col items-center shadow-sm relative overflow-hidden">
                    <div class="absolute inset-0 bg-purple-100 opacity-0 group-hover:opacity-20 transition-opacity"></div>
                    <span id="btnText2" class="text-3xl sm:text-4xl font-black mb-0.5 sm:mb-1">-</span>
                    <span id="btnDesc2" class="text-[10px] sm:text-xs font-bold opacity-70">-</span>
                </button>
            </div>
        </div>
        
        <!-- Footer / Copyright Info -->
        <div class="bg-gray-50 p-2 text-center text-[10px] text-gray-500 leading-tight border-t border-gray-100 shrink-0">
            <div class="my-0.5 scale-90 origin-center">©️ 請尊重著作權，延伸改做請徵詢同意，並於發布時標註原作者。</div>
            <div class="mb-1 text-red-500 font-bold scale-90 origin-center">🚫 不得商用。</div>
        </div>
    </div>

    <script>

        /* Data Sets                                  */

                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 1) * 10,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    life: 100
                });
            }
        }

        function updateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear last frame
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; // gravity
                p.life--;
                
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life / 30); // Fade out near end
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            
            // Clean up dead particles
            particles = particles.filter(p => p.life > 0);
            
            if (particles.length > 0) {
                animationId = requestAnimationFrame(updateParticles);
            } else {
                // IMPORTANT: Final clear to ensure no residue
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        function triggerConfetti() {
            // Cancel existing if any, to avoid double loop speedup (though logic handles it)
            if (animationId) cancelAnimationFrame(animationId);
            
            createParticles(canvas.width / 2, canvas.height / 2, 50);
            updateParticles();
        }

        /* -------------------------------------------------------------------------- */
        /* Sticker & Data Logic                                                       */
        /* -------------------------------------------------------------------------- */
        
        const LB_KEY_PREFIX = 'ai_lb_';
        const STICKER_KEY = 'ai_stickers';
        const MAX_LB_ENTRIES = 5;

        function getStickers() {
            const data = localStorage.getItem(STICKER_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveSticker(id) {
            let list = getStickers();
            if (!list.includes(id)) {
                list.push(id);
                localStorage.setItem(STICKER_KEY, JSON.stringify(list));
                return true; // is new
            }
            return false;
        }
        
        function openStickerAlbum() {
            const list = getStickers();
            const grid = document.getElementById('stickerGrid');
            const progress = document.getElementById('stickerProgress');
            
            grid.innerHTML = '';
            progress.innerText = `${list.length}/${STICKER_DB.length}`;
            
            STICKER_DB.forEach(s => {
                const hasIt = list.includes(s.id);
                const el = document.createElement('div');
                el.className = `flex flex-col items-center justify-center p-2 rounded-lg ${hasIt ? 'bg-white border-2 border-yellow-300 sticker-slot' : 'bg-gray-100 border border-gray-200 opacity-50'}`;
                el.innerHTML = `
                    <div class="text-3xl mb-1 filter ${hasIt ? '' : 'grayscale blur-[2px]'}">${s.char}</div>
                    <div class="text-[10px] text-center w-full truncate ${hasIt ? 'text-gray-700 font-bold' : 'text-gray-400'}">${hasIt ? s.name : '???'}</div>
                `;
                grid.appendChild(el);
            });
            
            document.getElementById('stickerScreen').classList.remove('hidden');
            // Hide badge when opened
            document.getElementById('newStickerBadge').classList.add('hidden');
        }
        
        function closeStickerAlbum() {
            document.getElementById('stickerScreen').classList.add('hidden');
        }

        function playGacha() {
            document.getElementById('gachaClosed').classList.add('hidden');
            document.getElementById('gachaOpen').classList.remove('hidden');
            
            // Simple random gacha
            const randIndex = Math.floor(Math.random() * STICKER_DB.length);
            const sticker = STICKER_DB[randIndex];
            const isNew = saveSticker(sticker.id);
            
            const disp = document.getElementById('newStickerDisplay');
            const name = document.getElementById('newStickerName');
            
            disp.innerText = sticker.char;
            name.innerText = (isNew ? "✨ NEW! " : "") + sticker.name + " (" + sticker.rare + ")";
            
            playSound('unlock');
            triggerConfetti();
        }

        function getLeaderboard(catKey) {
            const data = localStorage.getItem(LB_KEY_PREFIX + catKey);
            return data ? JSON.parse(data) : [];
        }

        function saveScoreToLB(catKey, name, score) {
            let lb = getLeaderboard(catKey);
            lb.push({ name, score, date: new Date().toISOString() });
            lb.sort((a, b) => b.score - a.score);
            lb = lb.slice(0, MAX_LB_ENTRIES);
            localStorage.setItem(LB_KEY_PREFIX + catKey, JSON.stringify(lb));
        }

        function isHighScore(catKey, score) {
            if (score <= 0) return false;
            let lb = getLeaderboard(catKey);
            if (lb.length < MAX_LB_ENTRIES) return true;
            return score > lb[lb.length - 1].score;
        }

        function openLeaderboard() {
            const lb = getLeaderboard(currentCategoryKey);
            const listEl = document.getElementById('leaderboardList');
            const noDataMsg = document.getElementById('noDataMsg');
            const titleEl = document.getElementById('lbCategoryTitle');

            titleEl.innerText = `${currentCategoryConfig.name} 排行榜`;
            listEl.innerHTML = '';

            if (lb.length === 0) {
                noDataMsg.classList.remove('hidden');
            } else {
                noDataMsg.classList.add('hidden');
                lb.forEach((entry, index) => {
                    const row = document.createElement('tr');
                    row.className = 'rank-row border-b border-gray-100 last:border-0';
                    row.innerHTML = `
                        <td class="py-2 pl-2 font-black rank-num text-lg w-12 text-center">#${index + 1}</td>
                        <td class="py-2 font-bold text-gray-700">${entry.name}</td>
                        <td class="py-2 text-right pr-2 font-mono font-bold text-blue-600">${entry.score}</td>
                    `;
                    listEl.appendChild(row);
                });
            }

            document.getElementById('leaderboardScreen').classList.remove('hidden');
        }

        function closeLeaderboard() {
            document.getElementById('leaderboardScreen').classList.add('hidden');
        }

        function submitHighScore() {
            const nameInput = document.getElementById('playerNameInput');
            let name = nameInput.value.trim();
            if (!name) name = currentStudentName;
            
            saveScoreToLB(currentCategoryKey, name, currentScore);
            
            document.getElementById('highScoreView').classList.add('hidden');
            document.getElementById('normalEndView').classList.remove('hidden');
            openLeaderboard();
        }

        function sendToGoogleSheets(name, category, score, combo, mode) {
            if (!GOOGLE_APP_SCRIPT_URL) return; 
            
            const data = {
                name: name,
                category: category,
                score: score,
                maxCombo: combo,
                mode: mode
            };

            fetch(GOOGLE_APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // 避免 CORS 阻擋問題
                headers: {
                    'Content-Type': 'text/plain', 
                },
                body: JSON.stringify(data)
            }).catch(err => console.error('成績發送失敗', err));
        }

        // --- UI Navigation ---

        function showCategorySelection() {
            document.getElementById('categoryScreen').classList.remove('hidden');
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('leaderboardScreen').classList.add('hidden');
            document.getElementById('stickerScreen').classList.add('hidden');
            document.getElementById('headerSubtitle').innerText = "全方位發音挑戰";
            isGameActive = false;
            clearInterval(timerInterval);
        }

        function selectCategory(key) {
            currentCategoryKey = key;
            currentCategoryConfig = categories[key];
            
            document.getElementById('btnText1').innerText = currentCategoryConfig.btn1.label;
            document.getElementById('btnDesc1').innerText = currentCategoryConfig.btn1.desc;
            document.getElementById('btnText2').innerText = currentCategoryConfig.btn2.label;
            document.getElementById('btnDesc2').innerText = currentCategoryConfig.btn2.desc;
            
            document.getElementById('categoryEmoji').innerText = currentCategoryConfig.emoji;
            document.getElementById('demoChar1').innerText = currentCategoryConfig.btn1.label;
            document.getElementById('demoDesc1').innerText = currentCategoryConfig.btn1.desc;
            document.getElementById('demoChar2').innerText = currentCategoryConfig.btn2.label;
            document.getElementById('demoDesc2').innerText = currentCategoryConfig.btn2.desc;

            document.getElementById('categoryScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('headerSubtitle').innerText = currentCategoryConfig.name + " 挑戰";
            
            const nameInput = document.getElementById('studentNameInput');
            if (nameInput && currentStudentName !== "無名英雄") {
                nameInput.value = currentStudentName; // 記住上次輸入的名字
            }
            
            mistakeBank = [];
        }

        // --- Game Flow ---
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuestions() {
            fullQuestionBank = [];
            currentCategoryConfig.list1.forEach(w => fullQuestionBank.push({ word: w, answer: 'k1', label: currentCategoryConfig.btn1.label }));
            currentCategoryConfig.list2.forEach(w => fullQuestionBank.push({ word: w, answer: 'k2', label: currentCategoryConfig.btn2.label }));
            shuffleArray(fullQuestionBank);
        }

        function startGame(mistakeMode = false) {
            const nameInput = document.getElementById('studentNameInput');
            if (nameInput && nameInput.value.trim() !== '') {
                currentStudentName = nameInput.value.trim();
            }

            isMistakeMode = mistakeMode;
            correctCount = 0;
            comboCount = 0;
            maxCombo = 0;
            
            if (!isMistakeMode) {
                initQuestions();
                mistakeBank = [];
                currentScore = 0;
                currentTime = 60;
                document.getElementById('scoreLabel').innerText = "分數";
                document.getElementById('timeLabel').innerText = "時間";
                document.getElementById('headerSubtitle').innerText = currentCategoryConfig.name + " 極限挑戰";
            } else {
                fullQuestionBank = [...mistakeBank];
                shuffleArray(fullQuestionBank);
                mistakeBank = []; 
                currentScore = 0; 
                currentTime = Math.max(20, fullQuestionBank.length * 4); 
                document.getElementById('scoreLabel').innerText = "完成率";
                document.getElementById('timeLabel').innerText = "倒數";
                document.getElementById('headerSubtitle').innerText = "🔥 錯題復仇戰";
            }

            currentQuestionIndex = 0;
            answeredCount = 0;
            isGameActive = true;
            
            updateScoreDisplay();
            document.getElementById('timerDisplay').innerText = currentTime;
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('btnMistakeChallenge').classList.add('hidden');
            document.getElementById('comboContainer').classList.add('hidden');
            document.getElementById('highScoreView').classList.add('hidden');
            document.getElementById('normalEndView').classList.remove('hidden');
            document.getElementById('gachaSection').classList.add('hidden');
            
            renderQuestion();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                currentTime--;
                document.getElementById('timerDisplay').innerText = currentTime;
                
                if (currentTime <= 10) {
                    document.getElementById('timerDisplay').classList.add('text-red-600', 'animate-pulse');
                } else {
                    document.getElementById('timerDisplay').classList.remove('text-red-600', 'animate-pulse');
                }

                if (currentTime <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function startMistakeChallenge() {
            startGame(true);
        }

        function updateScoreDisplay() {
            if (isMistakeMode) {
                const total = fullQuestionBank.length;
                const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);
                document.getElementById('scoreDisplay').innerText = pct + "%";
            } else {
                document.getElementById('scoreDisplay').innerText = currentScore;
            }
        }

        function renderQuestion() {
            if (currentQuestionIndex >= fullQuestionBank.length) {
                if (isMistakeMode) {
                    endGame();
                    return;
                } else {
                    shuffleArray(fullQuestionBank);
                    currentQuestionIndex = 0;
                }
            }

            const q = fullQuestionBank[currentQuestionIndex];
            const card = document.getElementById('questionCard');
            
            card.classList.remove('animate-pop');
            void card.offsetWidth;
            card.classList.add('animate-pop');

            let displayText = q.word.replace(/「(.*?)」/g, '<span class="text-blue-600">「$1」</span>');
            document.getElementById('questionText').innerHTML = displayText;
            
            document.getElementById('qCount').innerText = answeredCount + 1;
            
            const feedback = document.getElementById('resultFeedback');
            feedback.style.opacity = '0';
        }

        function triggerComboEffect() {
            const container = document.getElementById('comboContainer');
            const display = document.getElementById('comboCountDisplay');
            
            if (comboCount >= 2) {
                display.innerText = "x" + comboCount;
                container.classList.remove('hidden');
                
                // Re-trigger animation
                container.classList.remove('animate-combo');
                void container.offsetWidth;
                container.classList.add('animate-combo');
                
                // Extra visual fun for high combo
                if (comboCount % 5 === 0) triggerConfetti();
            } else {
                container.classList.add('hidden');
            }
        }

        function checkAnswer(userAnswerKey) {
            if (!isGameActive) return;

            const q = fullQuestionBank[currentQuestionIndex];
            const feedback = document.getElementById('resultFeedback');
            const card = document.getElementById('questionCard');

            if (userAnswerKey === q.answer) {
                // Correct
                comboCount++;
                if (comboCount > maxCombo) maxCombo = comboCount;
                
                if (!isMistakeMode) {
                    let bonus = Math.min(comboCount, 5); 
                    currentScore += (10 + bonus);
                }
                correctCount++;
                answeredCount++;
                updateScoreDisplay();
                playSound('correct');
                triggerComboEffect();
                
                feedback.innerHTML = `<span class="text-green-500">⭕ ${q.word} (${q.label})</span>`;
                feedback.style.opacity = '1';
                
                card.classList.add('border-green-400');
                setTimeout(() => card.classList.remove('border-green-400'), 200);

            } else {
                // Wrong
                comboCount = 0; 
                document.getElementById('comboContainer').classList.add('hidden'); 
                
                if (!isMistakeMode) {
                    currentScore = Math.max(0, currentScore - 5);
                }
                answeredCount++; 
                updateScoreDisplay();
                playSound('wrong');
                
                if (!mistakeBank.some(item => item.word === q.word)) {
                    mistakeBank.push(q);
                }

                feedback.innerHTML = `<span class="text-red-500">❌ 是 ${q.label} 才對！</span>`;
                feedback.style.opacity = '1';
                
                card.classList.add('animate-shake', 'border-red-400');
                setTimeout(() => card.classList.remove('animate-shake', 'border-red-400'), 400);
            }

            currentQuestionIndex++;
            setTimeout(() => {
                if (isGameActive) renderQuestion();
            }, 500);
        }

        function endGame() {
            isGameActive = false;
            clearInterval(timerInterval);
            document.getElementById('comboContainer').classList.add('hidden');
            
            document.getElementById('endScreen').classList.remove('hidden');
            
            const feedbackMsg = document.getElementById('feedbackMessage');
            const endEmoji = document.getElementById('endEmoji');
            const endTitle = document.getElementById('endTitle');
            const btnMistake = document.getElementById('btnMistakeChallenge');
            const mistakeCountSpan = document.getElementById('mistakeCount');
            const finalScoreEl = document.getElementById('finalScore');
            const maxComboDisplay = document.getElementById('maxComboDisplay'); // Note: not used in updated DOM, but kept for logic safety
            const maxComboValueEnd = document.getElementById('maxComboValueEnd');
            const highScoreView = document.getElementById('highScoreView');
            const normalEndView = document.getElementById('normalEndView');
            const gachaSection = document.getElementById('gachaSection');
            const rankBadge = document.getElementById('rankBadge');

            // Reset views
            highScoreView.classList.add('hidden');
            normalEndView.classList.remove('hidden');
            gachaSection.classList.add('hidden');

            // Determine Rank
            let rankText = "注音練習生";
            if (!isMistakeMode) {
                if (currentScore > 600) { rankText = "👑 絕世音感王"; endEmoji.innerText="🤩"; }
                else if (currentScore > 400) { rankText = "🔥 拼音高手"; endEmoji.innerText="😎"; }
                else if (currentScore > 200) { rankText = "🐣 練習小達人"; endEmoji.innerText="😄"; }
                else { rankText = "🌱 注音小菜鳥"; endEmoji.innerText="😐"; }
            } else {
                rankText = "復仇者";
            }
            rankBadge.innerText = rankText;

            // Show max combo stat
            if (maxComboValueEnd) maxComboValueEnd.innerText = maxCombo;

            if (isMistakeMode) {
                const total = fullQuestionBank.length;
                const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);
                finalScoreEl.innerText = pct + "%";
                endTitle.innerText = "復仇戰結束！";

                if (mistakeBank.length === 0) {
                     feedbackMsg.innerHTML = "<strong>太完美了！</strong><br>所有錯題都已經被你消滅了！恭喜！";
                     triggerConfetti();
                } else {
                     feedbackMsg.innerHTML = `<strong>別氣餒！</strong><br>還有 ${mistakeBank.length} 題比較頑強，要不要再挑戰一次？`;
                }
                
                if (mistakeBank.length > 0) {
                    btnMistake.classList.remove('hidden');
                    mistakeCountSpan.innerText = mistakeBank.length;
                } else {
                    btnMistake.classList.add('hidden');
                }
                
                // 傳送成績到 Google Sheets (錯題模式)
                sendToGoogleSheets(currentStudentName, currentCategoryConfig.name, pct + "%", maxCombo, "錯題模式");

            } else {
                finalScoreEl.innerText = currentScore;
                
                // 傳送成績到 Google Sheets (一般模式)
                sendToGoogleSheets(currentStudentName, currentCategoryConfig.name, currentScore, maxCombo, "一般模式");
                
                // Check Gacha Eligibility (e.g., > 200 pts)
                if (currentScore >= 200) {
                    gachaSection.classList.remove('hidden');
                    document.getElementById('gachaClosed').classList.remove('hidden');
                    document.getElementById('gachaOpen').classList.add('hidden');
                }

                if (isHighScore(currentCategoryKey, currentScore)) {
                    normalEndView.classList.add('hidden');
                    highScoreView.classList.remove('hidden');
                    document.getElementById('highScoreValue').innerText = currentScore;
                    document.getElementById('playerNameInput').value = currentStudentName !== "無名英雄" ? currentStudentName : ''; 
                    playSound('correct');
                    triggerConfetti();
                } else {
                    endTitle.innerText = "時間到！";
                    if (mistakeBank.length === 0 && currentScore > 0) {
                        feedbackMsg.innerHTML = "<strong>神級表現！</strong><br>完全沒有失誤，您的發音辨識能力無懈可擊！";
                    } else if (mistakeBank.length > 0) {
                        feedbackMsg.innerHTML = `<strong>發現弱點！</strong><br>雖然分數不錯，但有 ${mistakeBank.length} 個字容易搞混。<br>快點擊下方紅色按鈕進行特訓！`;
                    } else {
                        feedbackMsg.innerHTML = "<strong>熱身結束？</strong><br>分數有點低喔，是不是還沒準備好？";
                    }

                    if (mistakeBank.length > 0) {
                        btnMistake.classList.remove('hidden');
                        mistakeCountSpan.innerText = mistakeBank.length;
                    } else {
                        btnMistake.classList.add('hidden');
                    }
                }
            }
        }
    </script>
